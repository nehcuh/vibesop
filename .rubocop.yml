inherit_from: .rubocop_todo.yml

# RuboCop configuration

AllCops:
  TargetRubyVersion: 2.6
  NewCops: disable
  SuggestExtensions: false

Layout/LineLength:
  Max: 90

# fetch with block is intentional in tests — the cache's fetch method requires a block
Style/RedundantFetchBlock:
  Enabled: false
