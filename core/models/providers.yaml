schema_version: 1
status: phase-6-buildable

profiles:
  claude-code-default:
    target: claude-code
    maturity: active
    current_role: first_class_target
    mapping:
      critical_reasoner: claude.opus-class
      workhorse_coder: claude.sonnet-class
      fast_router: claude.haiku-class
      independent_verifier: second-model.cross-family
      cheap_local: local.ollama-class
    notes:
      - Current repository files are optimized for this profile.
      - Keep the verifier in a different model family when possible.
    model_config_note: |
      ## Model configuration

      **Important**: The mapping above shows semantic tier-to-model references. Actual model selection in Claude Code is controlled by:

      1. **Launch-time flag**: `claude --model opus|sonnet|haiku`
      2. **Task tool parameter**: When spawning subagents, use `model: "opus"|"sonnet"|"haiku"`
      3. **Settings file**: Configure defaults in `~/.claude/settings.json` (if supported)

      These mappings guide you to select appropriate models for different task types. See `targets/claude-code.md` for detailed configuration instructions.

  opencode-default:
    target: opencode
    maturity: active
    current_role: first_class_target
    mapping:
      critical_reasoner: configured.primary-high-reasoning
      workhorse_coder: configured.primary-coder
      fast_router: configured.fast-agent
      independent_verifier: second-model.cross-family
      cheap_local: local.ollama-class
    notes:
      - Prefer native OpenCode rules and permissions where possible.
      - OpenCode can often reuse AGENTS.md and Claude-style skill assets with light adaptation.
    model_config_note: |
      ## Model configuration

      **Important**: The mapping above shows semantic tier-to-model references. Actual model selection in OpenCode is configured in `opencode.json`:

      ```json
      {
        "models": {
          "primary": "claude-opus-4-6",
          "coder": "claude-sonnet-4-6",
          "fast": "claude-haiku-4-5"
        }
      }
      ```

      OpenCode supports flexible model configuration with multiple providers. You can mix Anthropic, OpenAI, and local models.

      See `targets/opencode.md` for detailed configuration instructions.

  glm-family-default:
    target: generic-open-weight
    maturity: exploratory
    mapping:
      critical_reasoner: glm.or.other.frontier-open-family
      workhorse_coder: glm.or.other.coding-workhorse
      fast_router: glm.or.other.fast-small-model
      independent_verifier: separate-model-family
      cheap_local: locally-hosted-default
    notes:
      - Exploratory placeholder profile only; `generic-open-weight` is not a build target in `bin/vibe`.
      - Benchmark each tier against your own tasks before enabling it by default.
      - Keep local deployment concerns outside the portable routing policy.
