name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    
    - name: Validate YAML syntax
      run: |
        ruby -ryaml -e "
          Dir.glob('core/**/*.yaml').each do |f|
            begin
              YAML.load_file(f)
              puts \"✓ #{f}\"
            rescue => e
              puts \"✗ #{f}: #{e.message}\"
              exit 1
            end
          end
        "
    
    - name: Run vibe inspect
      run: |
        chmod +x bin/vibe
        bin/vibe inspect --json > /dev/null

    - name: Generate all targets
      run: |
        make generate

    - name: Verify snapshots
      run: |
        make verify-snapshot

    - name: Check generated files exist
      run: |
        # Only check active platforms (dual-platform strategy)
        for target in claude-code opencode; do
          if [ ! -d "generated/$target" ]; then
            echo "Missing generated/$target"
            exit 1
          fi
          echo "✓ generated/$target"
        done

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    
    - name: Run all tests including E2E
      run: |
        # Run full test suite via rake (includes unit and E2E tests)
        COVERAGE=false bundle exec rake test

    - name: Run smoke test
      run: |
        chmod +x bin/vibe
        ./bin/vibe-smoke
    
    - name: Check coverage threshold
      run: |
        # Threshold set to 50% (current baseline: 54%)
        # Raise incrementally as coverage improves
        chmod +x test/benchmark/check_coverage.rb
        COVERAGE_THRESHOLD=50 ruby test/benchmark/check_coverage.rb

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    
    - name: Run RuboCop
      run: |
        if command -v rubocop &> /dev/null; then
          rubocop lib/ bin/vibe || true
        else
          echo "RuboCop not installed, skipping"
        fi
    
    - name: Check file permissions
      run: |
        if [ ! -x "bin/vibe" ]; then
          echo "bin/vibe is not executable"
          exit 1
        fi
        echo "✓ bin/vibe is executable"

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation links
      run: |
        # Check that docs/README.md exists
        if [ ! -f "docs/README.md" ]; then
          echo "Missing docs/README.md"
          exit 1
        fi
        echo "✓ docs/README.md exists"
        
        # Check that all referenced docs exist
        for doc in README.md README.zh-CN.md docs/README.md core/README.md targets/README.md; do
          if [ ! -f "$doc" ]; then
            echo "Missing $doc"
            exit 1
          fi
          echo "✓ $doc exists"
        done
    
    - name: Check target adapters
      run: |
        # Check active platforms
        echo "Checking active platform documentation..."
        for target in claude-code opencode; do
          if [ ! -f "targets/${target}.md" ]; then
            echo "Missing targets/${target}.md"
            exit 1
          fi
          echo "✓ targets/${target}.md exists (active)"
        done
        
        # Check planned platforms (documentation only)
        echo "Checking planned platform documentation..."
        for target in codex-cli cursor kimi-code vscode warp antigravity; do
          if [ -f "targets/${target}.md" ]; then
            echo "✓ targets/${target}.md exists (planned)"
          fi
        done
