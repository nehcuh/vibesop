# Target Platform Configurations
# Simplified, declarative configuration for supported platforms

schema_version: 1

platforms:
  claude-code:
    target_id: claude-code
    display_name: Claude Code
    description: Full-featured Claude Code workflow configuration

    output_paths:
      global:
        vibe_subdir: .vibe/claude-code
        entrypoint_name: CLAUDE.md
      project:
        vibe_subdir: .vibe/claude-code
        entrypoint_name: CLAUDE.md

    doc_types:
      global: [behavior, safety, task_routing, test_standards]
      project: [behavior, safety]

    native_config:
      global:
        type: json
        filename: settings.json
        builder: claude_settings_config
      project:
        type: json
        filename: settings.json
        builder: claude_settings_config

    runtime_dirs:
      global:
        - rules
        - docs
        - skills
        - agents
        - commands
        - memory
      project: []

    copy_mode:
      global: full
      project: minimal

  opencode:
    target_id: opencode
    display_name: OpenCode
    description: OpenCode workflow configuration

    output_paths:
      global:
        vibe_subdir: .vibe/opencode
        entrypoint_name: AGENTS.md
      project:
        vibe_subdir: .vibe/opencode
        entrypoint_name: AGENTS.md

    doc_types:
      global: [behavior, safety, task_routing, test_standards]
      project: [behavior, safety]

    native_config:
      global:
        type: json
        filename: opencode.json
        builder: opencode_config
      project:
        type: json
        filename: opencode.json
        builder: opencode_project_config

    runtime_dirs:
      global:
        - rules
        - docs
        - skills
        - agents
        - commands
        - memory
      project: []

    copy_mode:
      global: full
      project: minimal

# Platform aliases for user convenience
aliases:
  claude: claude-code
  cc: claude-code
